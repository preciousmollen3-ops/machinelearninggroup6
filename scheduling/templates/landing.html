<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mzuni Timetable System</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #f8fafc;
            background: radial-gradient(circle at top, rgba(96, 165, 250, 0.18), transparent 35%),
                        linear-gradient(180deg, #02112d 0%, #081b3f 45%, #0b1f4f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .hero-card {
            width: 100%;
            max-width: 1080px;
            border-radius: 36px;
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(148, 163, 184, 0.12);
            box-shadow: 0 30px 100px rgba(15, 23, 42, 0.35);
            padding: 48px 40px;
            text-align: center;
        }
        .hero-card img {
            width: min(220px, 100%);
            height: auto;
            max-height: 220px;
            object-fit: contain;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255,255,255,0.04);
            margin: 0 auto 28px;
            display: block;
        }
        .hero-card h1 {
            margin: 0;
            font-size: clamp(2.5rem, 4vw, 4.5rem);
            line-height: 1.02;
            letter-spacing: -0.025em;
            color: #f8fafc;
        }
        .hero-card p {
            max-width: 720px;
            margin: 24px auto 0;
            line-height: 1.8;
            color: rgba(241, 245, 249, 0.8);
            font-size: 1.05rem;
        }
        .hero-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 38px;
        }
        .hero-actions a {
            text-decoration: none;
        }
        .button,
        .button-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            min-width: 184px;
            transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
        }
        .button {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 18px 45px rgba(59, 130, 246, 0.28);
        }
        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 22px 55px rgba(59, 130, 246, 0.32);
        }
        .button-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.18);
        }
        .button-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        @media (max-width: 720px) {
            .hero-card {
                padding: 34px 24px;
            }
            .hero-card h1 {
                font-size: 2.5rem;
            }
            .hero-actions {
                flex-direction: column;
            }
            .button,
            .button-secondary {
                width: 100%;
                max-width: 320px;
            }
        }
    </style>
</head>
<body>
    <div class="hero-card">
        <img src="/static/images/mzuni-logo.png" alt="Mzuni Logo" />
        <h1>Mzuni Timetable System</h1>
        <p>Open the dashboard to view your generated timetable and explore the latest schedule data.</p>
        <div class="hero-actions">
            <a href="/dashboard/" class="button">Open Dashboard</a>
        </div>
    </div>
</body>
</html>
