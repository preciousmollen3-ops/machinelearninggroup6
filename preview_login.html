<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview — Mzuni Admin Login</title>
<style>
    body { margin:0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg, #04152f 0%, #0f2b59 45%, #123d73 100%); color:#f8fafc; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .login-card { width: min(460px, 100%); background: rgba(10,18,32,0.94); border-radius:24px; padding:36px 32px; border:1px solid rgba(255,255,255,0.12); box-shadow:0 24px 80px rgba(2,8,23,0.45); }
    .login-brand { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:12px; }
    .login-brand img { width:72px; height:72px; object-fit:contain; border-radius:16px; background:white; padding:8px; box-shadow:0 10px 24px rgba(15,23,42,0.2); }
    h1 { margin:0 0 8px; font-size:1.7rem; color:white; text-align:center; }
    p { margin:0 0 24px; text-align:center; color:rgba(226,232,240,0.8); }
    .back-link { display:inline-flex; width:100%; padding:10px 14px; border-radius:999px; text-decoration:none; color:#dbeafe; background:rgba(59,130,246,0.16); border:1px solid rgba(96,165,250,0.24); font-weight:600; text-align:center; }
    .form-row { margin-bottom:12px; }
    input[type=text], input[type=password] { width:100%; padding:12px 14px; border-radius:12px; border:1px solid rgba(148,163,184,0.25); background:#f8fafc; color:#0f172a }
    .btn { width:100%; padding:12px 16px; border-radius:999px; border:none; background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%); color:#fff; font-weight:700 }
</style>
</head>
<body>
<div class="login-card">
    <div class="login-brand">
        <img src="file:///C:/Users/preci/project_timetable/timetable_system/static/images/mzuni-admin-logo.png" alt="Mzuni Logo">
        <h1>Mzuni Admin</h1>
    </div>
    <p>Sign in to manage timetable data, lecturers, and scheduling records.</p>
    <a class="back-link" href="/dashboard/">← Back to Dashboard</a>

    <form>
        <div class="form-row">
            <input type="text" placeholder="Username">
        </div>
        <div class="form-row">
            <input type="password" placeholder="Password">
        </div>
        <div class="form-row">
            <button class="btn" type="button">Log in</button>
        </div>
    </form>
</div>
</body>
</html>
